# nginx config para api.wp.pe.
#
# - CORS abierto (los WordPress de los clientes consumen desde otros dominios).
# - Cache-Control diferenciado por path:
#   * /bridge/whitelist.json y /bridge/latest.json -> 5 min (cambian frecuente)
#   * /bridge/releases/*.zip                       -> 1 ano (immutable, mismo
#                                                    nombre = mismo contenido)
#   * /status/*                                    -> no-cache
#   * resto                                        -> 1 hora default
# - Cloudflare al frente respeta estos headers (modo "Respect Existing Headers").

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Logging mas conciso (1 line por request).
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Servir archivos JSON con header correcto.
    types {
        application/json json;
        application/zip  zip;
        text/html        html;
    }

    # CORS para todos los endpoints (los clientes WP cargan desde otros dominios).
    add_header 'Access-Control-Allow-Origin'  '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

    # /status/* — health checks, no cachear.
    location ^~ /status/ {
        add_header 'Cache-Control' 'no-store, no-cache, must-revalidate' always;
        try_files $uri =404;
    }

    # /bridge/releases/*.zip — immutable, cache largo.
    location ~ ^/bridge/releases/.+\.zip$ {
        add_header 'Cache-Control' 'public, max-age=31536000, immutable' always;
        try_files $uri =404;
    }

    # /bridge/whitelist.json y /bridge/latest.json — cambian frecuente.
    location ~ ^/bridge/(whitelist|latest)\.json$ {
        add_header 'Cache-Control' 'public, max-age=300' always;
        try_files $uri =404;
    }

    # Resto — cache default 1 hora.
    location / {
        add_header 'Cache-Control' 'public, max-age=3600' always;
        try_files $uri $uri/ =404;
    }

    # 404 simple JSON.
    error_page 404 /404.json;
    location = /404.json {
        internal;
        default_type application/json;
        return 404 '{"error":"not_found","status":404}';
    }
}
